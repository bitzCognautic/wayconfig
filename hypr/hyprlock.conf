# Autogenerated by ~/.local/bin/eink-wallpaper

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
}

background {
    path = /home/bitz/Pictures/Wallpapers/lion_galaxy_purple.jpg
    color = rgba(000000ee)
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.90
    brightness = 0.82
}

label {
    text = $TIME
    color = rgba(eeb4eaff)
    font_size = 64
    font_family = Google Sans
    position = 0, 80
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(000000aa)
}

input-field {
    size = 260, 48
    outline_thickness = 2
    dots_center = true
    dots_spacing = 0.35
    dots_rounding = -1
    fade_on_empty = true
    placeholder_text = <span foreground="##d0c3cc">Password</span>
    outer_color = rgba(4d444b66)
    inner_color = rgba(2e282dcc)
    font_color = rgba(ebdfe6ff)
    check_color = rgba(eeb4ea00)
    fail_color = rgba(ff5c5cff)
    position = 0, -40
    halign = center
    valign = center
}

