# Hyprland layer rules for transparent blurred bars.
# Include this file from your Hyprland config with:
# source = ~/.config/hypr/waybar-blur.conf

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.4, match:namespace waybar
layerrule = blur_popups on, match:namespace waybar

layerrule = blur on, match:namespace wayconfig-workspaces
layerrule = ignore_alpha 0.4, match:namespace wayconfig-workspaces
